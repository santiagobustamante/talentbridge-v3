      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: UPLOAD_DIR
        value: uploads
      - key: MAX_PDF_SIZE_MB
