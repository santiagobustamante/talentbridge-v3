      - key: FRONTEND_URL
        value: https://talentbridge-v3.vercel.app
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_MODEL
