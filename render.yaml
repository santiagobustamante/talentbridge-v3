services:
  - type: web
    name: api-gateway
    runtime: docker
    plan: free
    rootDir: BACKEND
    dockerfilePath: ./docker/api-gateway.Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: API_GATEWAY_PORT
        value: 3000
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: FRONTEND_URL
        value: https://talentbridge-v3.vercel.app
      - key: AUTH_SERVICE_URL
        value: http://auth-service:3001
      - key: CANDIDATE_SERVICE_URL
        value: http://candidate-service:3002
      - key: PORTFOLIO_SERVICE_URL
        value: http://portfolio-service:3003
      - key: COMPANY_SERVICE_URL
        value: http://company-service:3004
      - key: JOBS_SERVICE_URL
        value: http://jobs-service:3006
      - key: APPLICATIONS_SERVICE_URL
        value: http://applications-service:3007
      - key: CHAT_SERVICE_URL
        value: http://chat-service:3008
      - key: ASSISTANT_SERVICE_URL
        value: http://assistant-service:3009
      - key: DASHBOARD_SERVICE_URL
        value: http://dashboard-service:3010

  - type: web
    name: chat-service
    runtime: docker
    plan: free
    rootDir: BACKEND
    dockerfilePath: ./docker/chat-service.Dockerfile
